{% if page_obj.paginator.num_pages > 1 %}
  <nav class="pagination" aria-label="分頁">
    {% if page_obj.has_previous %}
      <a href="{% querystring page=page_obj.previous_page_number %}">上一頁</a>
    {% endif %}

    <span>第 {{ page_obj.number }} / {{ page_obj.paginator.num_pages }} 頁</span>

    {% if page_obj.has_next %}
      <a href="{% querystring page=page_obj.next_page_number %}">下一頁</a>
    {% endif %}
  </nav>
{% endif %}

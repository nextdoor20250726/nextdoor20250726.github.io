<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理登入｜世界樂器百科</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
    }
    .login-card {
      width: 360px;
      padding: 36px 28px;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #d7dde8;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 24px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #374151;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d7dde8;
      border-radius: 6px;
      font-size: 15px;
      margin-bottom: 16px;
      background: #fff;
    }
    button {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 6px;
      background: #0f766e;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #115e59; }
    .error {
      background: #fef2f0;
      color: #c2410c;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      border: 1px solid #fed7c5;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: #1d4ed8;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>管理登入</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="username">帳號</label>
      <input id="username" name="username" type="text" required autocomplete="username">
      <label for="password">密碼</label>
      <input id="password" name="password" type="password" required autocomplete="current-password">
      <button type="submit">登入</button>
    </form>
    <a class="back-link" href="{% url 'home' %}">返回首頁</a>
  </div>
</body>
</html>
